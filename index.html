<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Convite Digital</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F6CAC4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 9 / 16;
        }

        .container img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .botao {
            position: absolute;
            background: transparent;
            cursor: pointer;
            /* Remove o outline azul ao clicar (opcional) */
            outline: none;
            /* Garante que o link ocupe toda a área definida */
            display: block;
        }

        /* Responsividade para telas pequenas (celular) */
        @media (max-width: 768px) {
            .botao {
                /* Ajustes extras para toque no celular */
                touch-action: manipulation;
            }
        }

        /* Ajuste para telas muito pequenas (ex: iPhone SE) */
        @media (max-width: 480px) {
            .botao {
                /* Mantém a área de clique mas evita sobreposição */
                opacity: 0.9;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="convite.png" alt="Convite">

        <!-- 
            IMPORTANTE: 
            Os valores de left, top, width, height agora usam % (porcentagem)
            Isso faz o botão se reposicionar automaticamente em qualquer tela
        -->

                <!-- ========================== -->
        <!-- BOTÃO LOCALIZAÇÃO (Google Maps) - AJUSTADO -->
        <!-- ========================== -->
        <a
            class="botao"
            href="https://maps.app.goo.gl/DfQTH5TzdPytGSN79"
            target="_blank"
            rel="noopener noreferrer"
            style="
                left: 63%;
                top: 83%;     /* ANTES: 90% | DEPOIS: 83% (subiu 7%) */
                width: 12.35%;
                height: 11.27%;
            ">
        </a>

        <!-- ========================== -->
        <!-- BOTÃO WHATSAPP - AJUSTADO -->
        <!-- ========================== -->
        <a
            class="botao"
            href="https://wa.me/5511940351595?text=Confirmo%20minha%20presença.%20Serão%20*X*%20pessoas!"
            target="_blank"
            rel="noopener noreferrer"
            style="
                left: 24.7%;
                top: 84%;     /* ANTES: 91.2% | DEPOIS: 84% (subiu 7.2%) */
                width: 13.6%;
                height: 10.15%;
            ">
        </a>

        <!-- ========================== -->
        <!-- BOTÃO LISTA DE PRESENTES -->
        <!-- ========================== -->
        <!-- 
            Como você não tem o link, deixei esse botão oculto por enquanto.
            Quando tiver o link, substitua e ajuste as porcentagens.
        -->
        <a
            class="botao"
            href="#"
            target="_blank"
            style="display: none;">
        </a>
    </div>
</body>

</html>
