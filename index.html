<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Convite Digital</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#F6CAC4;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height: 100vh; /* Altura mínima = 100% da viewport (tela) */
    display: flex;
    flex-direction: column;

}

.container{

    position:relative;

    width:100%;
    max-width:1080px;

    aspect-ratio:9/16;

}

.container img{

    width:100%;
    height:100%;

    display:block;

}

.botao{

    position:absolute;

    /* DURANTE O AJUSTE */
    background:transparent;


    /*
    DEPOIS DE FINALIZAR TROQUE PARA:

    background:transparent;

    */

    cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<img src="convite.png" alt="Convite">
